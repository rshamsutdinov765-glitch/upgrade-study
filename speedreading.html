<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Скорочтение — UpGrade Study Club</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0a0a0f;
  color:white;
}

/* ФОН */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 30%, #ff6a00, transparent 30%),
    radial-gradient(circle at 80% 70%, #ff3d77, transparent 30%);
  background-size:200% 200%;
  animation:bgMove 20s infinite linear;
  z-index:-1;
}
@keyframes bgMove{
  0%{background-position:0% 50%,100% 50%;}
  50%{background-position:100% 50%,0% 50%;}
  100%{background-position:0% 50%,100% 50%;}
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  padding:15px 25px;
  z-index:1000;
  transition:0.4s;
}
.navbar.scrolled{
  background:rgba(10,10,15,0.7);
  backdrop-filter:blur(12px);
}

.nav-container{
  max-width:1100px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-weight:800;
  font-size:20px;
  background:linear-gradient(45deg,#ff6a00,#ff3d77);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.nav-links{
  display:flex;
  gap:25px;
}
.nav-links a{
  color:white;
  text-decoration:none;
  position:relative;
}
.nav-links a::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:0;
  width:0%;
  height:2px;
  background:#ff3d77;
  transition:0.3s;
}
.nav-links a:hover::after{
  width:100%;
}

/* HEADER */
header{
  text-align:center;
  padding:120px 20px 60px;
}

header img{
  width:180px;
  height:auto;
  animation:float 3s infinite;
}

@keyframes float{
  50%{transform:translateY(-10px);}
}

h1{
  font-size:40px;
  margin:20px 0;
  background:linear-gradient(45deg,#ff6a00,#ff3d77);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 2px 10px rgba(0,0,0,0.7);
}

h1, h2, p{
  text-shadow:0 2px 10px rgba(0,0,0,0.7);
}

.back{
  display:inline-block;
  margin-top:15px;
  color:#ff6a00;
  text-decoration:none;
  font-weight:600;
}
.back:hover{
  text-decoration:underline;
}

/* СЕКЦИИ */
section{
  max-width:900px;
  margin:auto;
  padding:60px 20px;
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}
section.show{
  opacity:1;
  transform:translateY(0);
}

h2{
  margin-bottom:20px;
  color:#ff3d77;
}

/* СПИСОК */
ul{list-style:none;}
li{
  margin:12px 0;
  padding-left:25px;
  position:relative;
}
li::before{
  content:"✔";
  position:absolute;
  left:0;
  color:#ff3d77;
}

/* ФОРМА */
.form-box{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  margin-top:20px;
}

input,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-family:inherit;
}

input{
  background:#1a1a2e;
  color:white;
}

input::placeholder{
  color:rgba(255,255,255,0.5);
}

button{
  background:linear-gradient(45deg,#ff6a00,#ff3d77);
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

button:active{
  transform:scale(0.98);
}

/* КНОПКИ */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  padding:18px;
  border-radius:50%;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
  z-index:999;
}

.whatsapp:hover{
  transform:scale(1.1);
}

.top{
  position:fixed;
  bottom:90px;
  right:20px;
  background:#ff3d77;
  padding:10px 14px;
  border-radius:10px;
  display:none;
  cursor:pointer;
  transition:0.3s;
  z-index:999;
}

.top:hover{
  background:#ff1a5f;
}

/* МОБИЛЬНАЯ АДАПТИВНОСТЬ */
@media (max-width:768px){
  h1{
    font-size:28px;
  }
  
  h2{
    font-size:22px;
  }
  
  .nav-links{
    gap:15px;
    font-size:14px;
  }
  
  header{
    padding:80px 20px 40px;
  }
  
  header img{
    width:120px;
  }
  
  section{
    padding:40px 15px;
  }
  
  .form-box{
    padding:20px;
  }
  
  input,button{
    padding:12px;
  }
}

@media (max-width:480px){
  .logo{
    font-size:16px;
  }
  
  h1{
    font-size:24px;
  }
  
  .nav-links{
    gap:10px;
    font-size:12px;
  }
  
  header img{
    width:100px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="nav-container">
<div class="logo">UpGrade</div>

<div class="nav-links">
<a href="index.html">Главная</a>
<a href="index.html#courses">Курсы</a>
<a href="index.html#form">Запись</a>
</div>
</div>
</nav>

<header>
<img src="logo.png" alt="UpGrade Logo" loading="lazy">
<h1>Скорочтение</h1>
<p>Развитие скорости чтения и концентрации</p>
<a href="index.html" class="back">⬅ Вернуться на главную</a>
</header>

<section>
<h2>Что вы получите</h2>
<ul>
<li>Увеличение скорости чтения</li>
<li>Понимание и анализ текста</li>
<li>Развитие памяти</li>
<li>Повышение концентрации</li>
</ul>
</section>

<section>
<h2>Записаться</h2>
<div class="form-box">
<input id="name" placeholder="Имя" type="text">
<input id="phone" placeholder="Телефон" type="tel">
<button onclick="send()">Записаться на Скорочтение</button>
</div>
</section>

<a href="https://wa.me/77474549856" class="whatsapp" target="_blank" rel="noopener noreferrer">💬</a>
<div class="top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>

/* NAVBAR */
window.addEventListener("scroll",()=>{
  document.querySelector(".navbar")
  .classList.toggle("scrolled",window.scrollY>50);
  
  /* анимация */
  document.querySelectorAll("section").forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight-100){
      sec.classList.add("show");
    }
  });
  
  /* вверх */
  document.querySelector(".top").style.display =
  window.scrollY>300?"block":"none";
});

/* форма */
function send(){
  let n = document.getElementById("name").value.trim();
  let p = document.getElementById("phone").value.trim();
  
  // Валидация имени
  if(!n || n.length < 2){
    alert("Введите корректное имя");
    return;
  }
  
  // Валидация телефона
  const phoneRegex = /^[\d+\-\s()]{8,}$/;
  if(!phoneRegex.test(p)){
    alert("Введите корректный номер телефона");
    return;
  }
  
  // Формирование сообщения
  let msg = `🔥 ЗАЯВКА НА СКОРОЧТЕНИЕ%0AИмя: ${encodeURIComponent(n)}%0AТел: ${encodeURIComponent(p)}`;
  
  try{
    window.open(`https://wa.me/77474549856?text=${msg}`);
    // Очистка формы после отправки
    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
  } catch(error){
    alert("Ошибка при отправке. Попробуйте позже.");
    console.error(error);
  }
}
</script>

</body>
</html>
