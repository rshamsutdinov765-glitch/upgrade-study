<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UpGrade Study Club</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #f4f6fb;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #ff6a00, #ff3d77, #6a5cff);
  color: white;
  text-align: center;
  padding: 80px 20px;
}

header img {
  width: 120px;
}

h1 {
  font-size: 42px;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 30px;
  background: white;
  color: #ff3d77;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
}

/* SECTION */
section {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

/* COURSES */
.courses {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 25px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

/* FORM */
.form-box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 15px;
  background: linear-gradient(45deg, #ff6a00, #ff3d77);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
}

/* CONTACT */
.contact {
  background: #1a2a44;
  color: white;
  border-radius: 20px;
  padding: 30px;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 16px;
  border-radius: 50px;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h1>UpGrade Study Club</h1>
  <p>Учебный центр в Алматы</p>
  <a href="#form" class="btn">Оставить заявку</a>
</header>

<section>
  <h2>Наши курсы</h2>
  <div class="courses">

    <div class="card">📘 Математика</div>
    <div class="card">📖 Скорочтение</div>
    <div class="card">🇬🇧 Английский</div>
    <div class="card">🧒 Продлёнка</div>

  </div>
</section>

<section id="form">
  <div class="form-box">
    <h2>Записаться на занятие</h2>

    <input type="text" id="name" placeholder="Ваше имя">
    <input type="tel" id="phone" placeholder="Ваш телефон">

    <select id="course">
      <option>Математика</option>
      <option>Скорочтение</option>
      <option>Английский</option>
      <option>Продлёнка</option>
    </select>

    <button onclick="sendToWhatsApp()">Отправить заявку</button>
  </div>
</section>

<section>
  <div class="contact">
    <h2>Контакты</h2>
    <p>📍 Алматы, мкр. Айгерим, ул. Молдагулова 19</p>
    <p>📞 8 747 454 98 56</p>
  </div>
</section>

<a href="https://wa.me/77474549856" class="whatsapp">💬</a>

<script>
function sendToWhatsApp() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let course = document.getElementById("course").value;

  let message = `Заявка с сайта:%0AИмя: ${name}%0AТелефон: ${phone}%0AКурс: ${course}`;

  window.open(`https://wa.me/77474549856?text=${message}`, '_blank');
}
</script>

</body>
</html>
